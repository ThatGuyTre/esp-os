esphome:
  name: esp-home-display
  friendly_name: ESP Home Display

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

globals:
  - id: color_step
    type: int
    initial_value: '0'

output:
  - platform: ledc
    pin: GPIO4
    id: bl_pwm

light:
  - platform: monochromatic
    output: bl_pwm
    id: backlight
    restore_mode: ALWAYS_ON

display:
  - platform: st7735
    model: "INITR_18BLACKTAB"
    cs_pin: GPIO5
    dc_pin: GPIO17
    reset_pin: GPIO16
    rotation: 0
    device_width: 128
    device_height: 160
    col_start: 0
    row_start: 0
    use_bgr: false
    invert_colors: false
    update_interval: 200ms
    lambda: |-
      if (id(color_step) == 0) {
        it.fill(Color(255, 0, 0));
      } else if (id(color_step) == 1) {
        it.fill(Color(0, 255, 0));
      } else if (id(color_step) == 2) {
        it.fill(Color(0, 0, 255));
      } else {
        it.fill(Color(0, 0, 0));
      }

interval:
  - interval: 800ms
    then:
      - lambda: |-
          id(color_step) = (id(color_step) + 1) % 4;
